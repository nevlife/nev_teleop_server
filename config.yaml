# Zenoh router endpoint
zenoh_locator: "tcp/127.0.0.1:7447"

# Heartbeat frequency (Hz)
heartbeat_rate:       5.0
# State validation interval (sec)
state_push_interval:  0.5
# Station heartbeat timeout (sec)
station_timeout:      2.0

# Robot wheelbase for Ackermann steering (m)
wheelbase:            0.650

# Keys that update last_control_recv timestamp
control_keys:
  - mux
  - twist
  - network
  - hunter
  - estop

# Robot disconnect threshold (sec)
disconnect_timeout:   3.0
# Bandwidth calculation cycle (sec)
bw_calc_interval:     1.0
# Sequence number wrap limit (uint16)
seq_max:              65536
# Camera packet header size: double(8B) + uint16(2B)
camera_header_bytes:  10
