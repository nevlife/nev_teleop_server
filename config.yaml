# Zenoh router listen port
zenoh_port: 7447

# Telemetry push frequency (Hz)
telemetry_rate:       2.0
# Station heartbeat timeout (sec)
station_timeout:      3.0
# RTT ping frequency (Hz)
ping_rate:            1.0

# Keys that update last_control_recv timestamp
control_keys:
  - mux
  - twist
  - network
  - estop

# Robot disconnect threshold (sec)
disconnect_timeout:   3.0
# Bandwidth calculation cycle (sec)
bw_calc_interval:     1.0
# Sequence number wrap limit (uint16)
seq_max:              65536
# Camera packet header size: double(8B) + float(4B)
camera_header_bytes:  12
