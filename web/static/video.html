<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEV Video + Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .main-content {
      display: flex;
      height: calc(100vh - 74px); /* topbar + cmdbar */
      overflow: hidden;
    }
    .video-panel {
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .video-panel video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .video-overlay {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 11px;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 3px;
    }
    .dashboard-panel {
      width: 340px;
      overflow-y: auto;
      border-left: 1px solid var(--border);
      background: var(--bg);
    }
    .no-video {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <div class="topbar">
    <span class="title">NEV VIDEO + DASHBOARD</span>
    <span class="spacer"></span>
    <span id="badge-veh" class="badge">VEH</span>
    <span id="badge-stas" class="badge">STAS</span>
    <span id="badge-joy" class="badge">JOY</span>
    <span id="badge-rem" class="badge">REM</span>
    <span id="ws-status" class="ws-status disconnected">WS</span>
    <span id="clock" class="clock">--:--:--</span>
  </div>

  <!-- Command bar -->
  <div class="cmdbar">
    <span class="label">MODE</span>
    <button class="mode-btn" data-mode="-1">IDLE</button>
    <button class="mode-btn" data-mode="0">CTRL</button>
    <button class="mode-btn" data-mode="1">NAV</button>
    <button class="mode-btn" data-mode="2">REMOTE</button>
    <span class="spacer"></span>
    <button id="estop-btn" class="estop-btn">&#9632; E-STOP</button>
  </div>

  <!-- Main content: video + dashboard side panel -->
  <div class="main-content">
    <div class="video-panel">
      <video id="video-player" autoplay muted></video>
      <div class="video-overlay" id="video-stats">waiting for video...</div>
      <div class="no-video" id="no-video">No video stream</div>
    </div>
    <div class="dashboard-panel">
      <div class="cards" style="display:block;">
        <div class="card"><div class="card-title">HUNTER</div><div class="card-body" id="body-hunter"></div></div>
        <div class="card"><div class="card-title">MUX</div><div class="card-body" id="body-mux"></div></div>
        <div class="card"><div class="card-title">NETWORK</div><div class="card-body" id="body-network"></div></div>
        <div class="card"><div class="card-title">TWIST</div><div class="card-body" id="body-twist"></div></div>
        <div class="card" id="card-estop"><div class="card-title">E-STOP</div><div class="card-body" id="body-estop"></div></div>
        <div class="card"><div class="card-title">JOYSTICK</div><div class="card-body" id="body-joystick"></div></div>
        <div class="card"><div class="card-title">RESOURCES</div><div class="card-body" id="body-resources"></div></div>
        <div class="card"><div class="card-title">NET INTERFACES</div><div class="card-body" id="body-netifaces"></div></div>
        <div class="card"><div class="card-title">DISK</div><div class="card-body" id="body-disk"></div></div>
        <div class="card"><div class="card-title">ALERTS</div><div class="card-body" id="body-alerts"></div></div>
      </div>
    </div>
  </div>

  <script src="/static/jmuxer.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/video.js"></script>
</body>
</html>
